<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Property Setup — Wireframe</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            wf: {
              bg: '#e5e7eb', surface: '#ffffff', card: '#ffffff', text: '#18181b',
              secondary: '#52525b', muted: '#71717a', border: '#d4d4d8',
              accent: '#a1a1aa', 'accent-soft': '#f4f4f5', dark: '#27272a', mid: '#a1a1aa',
            }
          }
        }
      }
    }
  </script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body { background: #e5e7eb; }
    .wf-phone { max-width: 390px; min-height: 100vh; margin: 0 auto; background: #ffffff; }
    .wf-card { background: #ffffff; border: 1px solid #e4e4e7; border-radius: 1rem; padding: 1rem; }
    .wf-btn-primary { display: inline-flex; align-items: center; justify-content: center; gap: 8px; background: #3f3f46; color: #ffffff; font-weight: 600; font-size: 16px; padding: 14px 24px; border-radius: 1rem; width: 100%; }
    .wf-btn-secondary { display: inline-flex; align-items: center; justify-content: center; gap: 8px; background: #f4f4f5; color: #3f3f46; font-weight: 600; font-size: 16px; padding: 14px 24px; border-radius: 1rem; width: 100%; border: 1px solid #e4e4e7; }
    .wf-input { width: 100%; padding: 14px 16px; border: 1px solid #d4d4d8; border-radius: 1rem; font-size: 16px; color: #18181b; background: #ffffff; outline: none; }
    .wf-input:focus { border-color: #a1a1aa; box-shadow: 0 0 0 3px rgba(161,161,170,0.15); }
    .wf-input::placeholder { color: #a1a1aa; }
    .wf-page-title { font-size: 28px; font-weight: 700; color: #18181b; }
    .wf-section-title { font-size: 20px; font-weight: 600; color: #18181b; }
    .wf-bottom-bar { position: sticky; bottom: 0; background: #ffffff; border-top: 1px solid #e4e4e7; padding: 12px 16px; padding-bottom: max(12px, env(safe-area-inset-bottom)); }
  </style>
</head>
<body>
  <div class="wf-phone flex flex-col">
    <!-- Top Bar -->
    <div class="flex items-center gap-3 px-4 py-4 border-b border-zinc-100">
      <button class="p-1">
        <i data-lucide="x" class="w-5 h-5 text-wf-secondary"></i>
      </button>
      <div>
        <p class="text-sm text-wf-muted">Step 1 of 3</p>
        <p class="font-semibold text-wf-text">Create property</p>
      </div>
    </div>

    <!-- Progress Bar -->
    <div class="px-4 pt-3">
      <div class="w-full h-1.5 bg-zinc-100 rounded-full">
        <div class="w-1/3 h-full bg-zinc-400 rounded-full"></div>
      </div>
    </div>

    <!-- Form -->
    <div class="px-6 pt-8 flex-1">
      <h1 class="wf-page-title mb-2">Where is your property?</h1>
      <p class="text-wf-muted text-[15px] mb-8">We'll use this to organize your billing.</p>

      <div class="space-y-5">
        <div>
          <label class="block text-sm font-medium text-wf-secondary mb-2">Property name or address</label>
          <input type="text" class="wf-input" placeholder="e.g. Rua Augusta 123">
        </div>

        <div>
          <label class="block text-sm font-medium text-wf-secondary mb-2">City</label>
          <input type="text" class="wf-input" placeholder="e.g. São Paulo">
        </div>

        <div class="flex gap-3">
          <div class="flex-1">
            <label class="block text-sm font-medium text-wf-secondary mb-2">State</label>
            <input type="text" class="wf-input" placeholder="SP">
          </div>
          <div class="flex-1">
            <label class="block text-sm font-medium text-wf-secondary mb-2">Country</label>
            <div class="relative">
              <select class="wf-input appearance-none pr-10">
                <option>Brazil</option>
              </select>
              <i data-lucide="chevron-down" class="w-4 h-4 text-wf-muted absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none"></i>
            </div>
          </div>
        </div>

        <!-- Unit Section -->
        <div class="pt-4 border-t border-zinc-100">
          <h2 class="wf-section-title mb-2">Name your first unit</h2>
          <p class="text-sm text-wf-muted mb-4">If this property has multiple apartments or rooms, name the first one. You can add more later.</p>
          <input type="text" class="wf-input" placeholder="e.g. Apt 201, Studio A, Unit 1">
        </div>

        <!-- Currency -->
        <div>
          <label class="block text-sm font-medium text-wf-secondary mb-2">Billing currency</label>
          <div class="relative">
            <select class="wf-input appearance-none pr-10">
              <option>BRL — Brazilian Real (R$)</option>
            </select>
            <i data-lucide="chevron-down" class="w-4 h-4 text-wf-muted absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none"></i>
          </div>
        </div>
      </div>
    </div>

    <!-- Bottom Action -->
    <div class="wf-bottom-bar">
      <button class="wf-btn-primary">
        Continue
        <i data-lucide="arrow-right" class="w-4 h-4"></i>
      </button>
    </div>
  </div>

  <script>lucide.createIcons();</script>
</body>
</html>
