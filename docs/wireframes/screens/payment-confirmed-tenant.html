<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Confirmed (Tenant) — Wireframe</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            wf: {
              bg: '#e5e7eb', surface: '#ffffff', card: '#ffffff', text: '#18181b',
              secondary: '#52525b', muted: '#71717a', border: '#d4d4d8',
              accent: '#a1a1aa', 'accent-soft': '#f4f4f5', dark: '#27272a', mid: '#a1a1aa',
            }
          }
        }
      }
    }
  </script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body { background: #e5e7eb; }
    .wf-phone { max-width: 390px; min-height: 100vh; margin: 0 auto; background: #ffffff; }
    .wf-card { background: #ffffff; border: 1px solid #e4e4e7; border-radius: 1rem; padding: 1rem; }
    .wf-badge { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: 9999px; font-size: 13px; font-weight: 500; }
    .wf-btn-primary { display: inline-flex; align-items: center; justify-content: center; gap: 8px; background: #3f3f46; color: #ffffff; font-weight: 600; font-size: 16px; padding: 14px 24px; border-radius: 1rem; width: 100%; }
    .wf-page-title { font-size: 28px; font-weight: 700; color: #18181b; }
    .wf-bottom-bar { position: sticky; bottom: 0; background: #ffffff; border-top: 1px solid #e4e4e7; padding: 12px 16px; padding-bottom: max(12px, env(safe-area-inset-bottom)); }
  </style>
</head>
<body>
  <div class="wf-phone flex flex-col">
    <!-- Simulated Notification -->
    <div class="bg-zinc-100 px-4 py-3 flex items-center gap-3 border-b border-zinc-200">
      <div class="w-8 h-8 bg-zinc-300 rounded-lg flex items-center justify-center flex-shrink-0">
        <i data-lucide="bell" class="w-4 h-4 text-zinc-600"></i>
      </div>
      <div class="flex-1 min-w-0">
        <p class="text-xs font-medium text-wf-secondary">mavenn</p>
        <p class="text-xs text-wf-muted truncate">Your payment has been confirmed</p>
      </div>
      <p class="text-xs text-wf-muted">now</p>
    </div>

    <!-- Content -->
    <div class="px-6 pt-8 flex-1 flex flex-col">
      <!-- Success -->
      <div class="text-center mb-8">
        <div class="w-16 h-16 bg-zinc-100 rounded-full flex items-center justify-center mx-auto mb-6">
          <i data-lucide="check" class="w-8 h-8 text-zinc-500"></i>
        </div>
        <h1 class="wf-page-title mb-3">Payment confirmed</h1>
        <p class="text-wf-muted text-[15px] max-w-[300px] mx-auto">
          Your landlord confirmed your payment for the March 2026 statement.
        </p>
      </div>

      <!-- Summary -->
      <div class="wf-card mb-6">
        <div class="space-y-3">
          <div class="flex items-center justify-between">
            <span class="text-sm text-wf-muted">Amount</span>
            <span class="text-[15px] text-wf-text font-bold">R$ 1.300,00</span>
          </div>
          <div class="border-t border-zinc-100"></div>
          <div class="flex items-center justify-between">
            <span class="text-sm text-wf-muted">Statement</span>
            <span class="text-sm text-wf-text font-medium">March 2026</span>
          </div>
          <div class="border-t border-zinc-100"></div>
          <div class="flex items-center justify-between">
            <span class="text-sm text-wf-muted">Method</span>
            <span class="text-sm text-wf-text font-medium">Pix</span>
          </div>
          <div class="border-t border-zinc-100"></div>
          <div class="flex items-center justify-between">
            <span class="text-sm text-wf-muted">Confirmed</span>
            <span class="text-sm text-wf-text font-medium">March 9, 2026</span>
          </div>
          <div class="border-t border-zinc-100"></div>
          <div class="flex items-center justify-between">
            <span class="text-sm text-wf-muted">Status</span>
            <span class="wf-badge bg-zinc-200 text-wf-dark">
              <i data-lucide="check" class="w-3 h-3"></i> Paid
            </span>
          </div>
        </div>
      </div>

      <!--
        Trust pulse survey
        Display rules:
        - Always shown on the tenant's first completed billing cycle
        - Then shown occasionally (e.g. every 3rd cycle, or ~30% random)
        - Never shown if tenant has an open/unresolved dispute on this statement
        - DO show if there was a dispute that has since been resolved
          (captures whether the resolution process built or eroded trust)
      -->
      <div class="wf-card bg-zinc-50 mb-6">
        <p class="text-sm font-medium text-wf-secondary mb-3 text-center">Do you trust the charges on this statement?</p>
        <div class="flex items-center justify-center gap-6">
          <button class="flex flex-col items-center gap-1">
            <span class="text-2xl">👍</span>
            <span class="text-xs text-wf-muted">Yes</span>
          </button>
          <button class="flex flex-col items-center gap-1">
            <span class="text-2xl">🤷</span>
            <span class="text-xs text-wf-muted">Somewhat</span>
          </button>
          <button class="flex flex-col items-center gap-1">
            <span class="text-2xl">👎</span>
            <span class="text-xs text-wf-muted">No</span>
          </button>
        </div>
      </div>

      <div class="flex-1"></div>
    </div>

    <!-- Bottom Action -->
    <div class="wf-bottom-bar">
      <button class="wf-btn-primary">
        Back to Home
        <i data-lucide="arrow-right" class="w-4 h-4"></i>
      </button>
    </div>
  </div>

  <script>lucide.createIcons();</script>
</body>
</html>
