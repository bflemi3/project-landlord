<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Field Correction — Wireframe</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            wf: {
              bg: '#e5e7eb', surface: '#ffffff', card: '#ffffff', text: '#18181b',
              secondary: '#52525b', muted: '#71717a', border: '#d4d4d8',
              accent: '#a1a1aa', 'accent-soft': '#f4f4f5', dark: '#27272a', mid: '#a1a1aa',
            }
          }
        }
      }
    }
  </script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body { background: #e5e7eb; }
    .wf-phone { max-width: 390px; min-height: 100vh; margin: 0 auto; background: #ffffff; }
    .wf-card { background: #ffffff; border: 1px solid #e4e4e7; border-radius: 1rem; padding: 1rem; }
    .wf-btn-primary { display: inline-flex; align-items: center; justify-content: center; gap: 8px; background: #3f3f46; color: #ffffff; font-weight: 600; font-size: 16px; padding: 14px 24px; border-radius: 1rem; width: 100%; }
    .wf-btn-secondary { display: inline-flex; align-items: center; justify-content: center; gap: 8px; background: #f4f4f5; color: #3f3f46; font-weight: 600; font-size: 16px; padding: 14px 24px; border-radius: 1rem; width: 100%; border: 1px solid #e4e4e7; }
    .wf-input { width: 100%; padding: 14px 16px; border: 1px solid #d4d4d8; border-radius: 1rem; font-size: 16px; color: #18181b; background: #ffffff; outline: none; }
    .wf-input:focus { border-color: #a1a1aa; box-shadow: 0 0 0 3px rgba(161,161,170,0.15); }
    .wf-input::placeholder { color: #a1a1aa; }
    .wf-input-corrected { border-color: #27272a; background: #fafafa; }
    .wf-page-title { font-size: 28px; font-weight: 700; color: #18181b; }
    .wf-section-title { font-size: 20px; font-weight: 600; color: #18181b; }
    .wf-bottom-bar { position: sticky; bottom: 0; background: #ffffff; border-top: 1px solid #e4e4e7; padding: 12px 16px; padding-bottom: max(12px, env(safe-area-inset-bottom)); }
  </style>
</head>
<body>
  <div class="wf-phone flex flex-col">
    <!-- Top Bar -->
    <div class="flex items-center gap-3 px-4 py-4 border-b border-zinc-100">
      <button class="p-1">
        <i data-lucide="arrow-left" class="w-5 h-5 text-wf-secondary"></i>
      </button>
      <div>
        <p class="font-semibold text-wf-text">Correct Extraction</p>
        <p class="text-sm text-wf-muted">CPFL Energia</p>
      </div>
    </div>

    <!-- Content -->
    <div class="px-6 pt-6 flex-1">
      <h1 class="wf-page-title mb-2">Fix what's wrong</h1>
      <p class="text-wf-muted text-[15px] mb-6">Edit the fields that were extracted incorrectly. Corrections are logged for future accuracy.</p>

      <!-- Source Preview -->
      <button class="w-full wf-card bg-zinc-50 flex items-center gap-3 mb-6">
        <i data-lucide="file-text" class="w-5 h-5 text-wf-mid flex-shrink-0"></i>
        <span class="text-sm font-medium text-wf-secondary">View source document</span>
        <i data-lucide="external-link" class="w-4 h-4 text-wf-accent ml-auto"></i>
      </button>

      <!-- Editable Fields -->
      <div class="space-y-5">
        <div>
          <label class="block text-sm font-medium text-wf-secondary mb-2">Provider</label>
          <input type="text" class="wf-input" value="CPFL Energia" disabled>
        </div>

        <div>
          <label class="block text-sm font-medium text-wf-secondary mb-2">Billing period</label>
          <input type="text" class="wf-input" value="Feb 15 – Mar 14, 2026">
        </div>

        <div>
          <label class="block text-sm font-medium text-wf-secondary mb-2">Due date</label>
          <input type="text" class="wf-input" value="Mar 20, 2026">
        </div>

        <!-- Corrected field -->
        <div>
          <div class="flex items-center justify-between mb-2">
            <label class="text-sm font-medium text-wf-secondary">Amount</label>
            <span class="text-xs font-medium text-wf-dark bg-zinc-200 px-2 py-0.5 rounded">Corrected</span>
          </div>
          <div class="relative">
            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-wf-muted font-medium">R$</span>
            <input type="text" class="wf-input wf-input-corrected pl-12 font-bold" value="295,00">
          </div>
          <div class="flex items-center gap-2 mt-2">
            <i data-lucide="arrow-right" class="w-3 h-3 text-wf-muted"></i>
            <p class="text-sm text-wf-muted">Was: R$ 285,00</p>
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-wf-secondary mb-2">Usage</label>
          <input type="text" class="wf-input" value="312 kWh">
        </div>

        <!-- Correction Note -->
        <div>
          <label class="block text-sm font-medium text-wf-secondary mb-2">Why was this wrong? (optional)</label>
          <textarea class="wf-input resize-none h-20" placeholder="e.g. Late fee was included in the total but not extracted">Amount on the PDF includes a R$ 10 late fee that wasn't in the extracted total.</textarea>
        </div>
      </div>

      <div class="h-6"></div>
    </div>

    <!-- Bottom Actions -->
    <div class="wf-bottom-bar space-y-2">
      <button class="wf-btn-primary">
        <i data-lucide="check" class="w-4 h-4"></i>
        Save & Approve
      </button>
      <button class="wf-btn-secondary !border-0 !bg-transparent text-wf-muted">
        Cancel
      </button>
    </div>
  </div>

  <script>lucide.createIcons();</script>
</body>
</html>
