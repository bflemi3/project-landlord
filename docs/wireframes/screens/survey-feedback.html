<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feedback Survey — Wireframe</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            wf: {
              bg: '#e5e7eb', surface: '#ffffff', card: '#ffffff', text: '#18181b',
              secondary: '#52525b', muted: '#71717a', border: '#d4d4d8',
              accent: '#a1a1aa', 'accent-soft': '#f4f4f5', dark: '#27272a', mid: '#a1a1aa',
            }
          }
        }
      }
    }
  </script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body { background: #e5e7eb; }
    .wf-phone { max-width: 390px; min-height: 100vh; margin: 0 auto; background: #ffffff; }
    .wf-btn-primary { display: inline-flex; align-items: center; justify-content: center; gap: 8px; background: #3f3f46; color: #ffffff; font-weight: 600; font-size: 16px; padding: 14px 24px; border-radius: 1rem; width: 100%; }
    .wf-page-title { font-size: 28px; font-weight: 700; color: #18181b; }
    .wf-bottom-bar { position: sticky; bottom: 0; background: #ffffff; border-top: 1px solid #e4e4e7; padding: 12px 16px; padding-bottom: max(12px, env(safe-area-inset-bottom)); }
  </style>
</head>
<body>
  <div class="wf-phone flex flex-col">
    <!-- Top Bar -->
    <div class="flex items-center justify-end px-4 py-4">
      <button class="p-1">
        <i data-lucide="x" class="w-5 h-5 text-wf-muted"></i>
      </button>
    </div>

    <!-- Content -->
    <div class="px-6 pt-8 flex-1 flex flex-col items-center text-center">
      <!-- Success Icon -->
      <div class="w-16 h-16 bg-zinc-100 rounded-full flex items-center justify-center mb-6">
        <i data-lucide="check" class="w-8 h-8 text-zinc-500"></i>
      </div>

      <h1 class="wf-page-title mb-3">You're all set!</h1>
      <p class="text-wf-muted text-[15px] mb-10 max-w-[280px]">
        Your property is ready. Before you go, one quick question:
      </p>

      <!-- Survey Question -->
      <div class="w-full text-left">
        <p class="text-lg font-semibold text-wf-text mb-6 text-center">
          Was setting up this property easier than your usual process?
        </p>

        <div class="space-y-3">
          <button class="w-full flex items-center gap-4 p-4 rounded-2xl border border-zinc-200 hover:bg-zinc-50 transition-colors">
            <div class="w-10 h-10 bg-zinc-100 rounded-full flex items-center justify-center flex-shrink-0">
              <span class="text-xl">😊</span>
            </div>
            <div class="text-left">
              <p class="font-medium text-wf-text">Much easier</p>
              <p class="text-sm text-wf-muted">This saved me real time</p>
            </div>
          </button>

          <button class="w-full flex items-center gap-4 p-4 rounded-2xl border border-zinc-200 hover:bg-zinc-50 transition-colors">
            <div class="w-10 h-10 bg-zinc-100 rounded-full flex items-center justify-center flex-shrink-0">
              <span class="text-xl">🤔</span>
            </div>
            <div class="text-left">
              <p class="font-medium text-wf-text">About the same</p>
              <p class="text-sm text-wf-muted">Not noticeably different</p>
            </div>
          </button>

          <button class="w-full flex items-center gap-4 p-4 rounded-2xl border border-zinc-200 hover:bg-zinc-50 transition-colors">
            <div class="w-10 h-10 bg-zinc-100 rounded-full flex items-center justify-center flex-shrink-0">
              <span class="text-xl">😕</span>
            </div>
            <div class="text-left">
              <p class="font-medium text-wf-text">Harder than expected</p>
              <p class="text-sm text-wf-muted">Something felt confusing</p>
            </div>
          </button>
        </div>
      </div>
    </div>

    <!-- Bottom Action -->
    <div class="wf-bottom-bar">
      <button class="wf-btn-primary">
        Go to Dashboard
        <i data-lucide="arrow-right" class="w-4 h-4"></i>
      </button>
    </div>
  </div>

  <script>lucide.createIcons();</script>
</body>
</html>
