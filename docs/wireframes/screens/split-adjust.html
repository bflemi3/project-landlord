<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adjust Split — Wireframe</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            wf: {
              bg: '#e5e7eb', surface: '#ffffff', card: '#ffffff', text: '#18181b',
              secondary: '#52525b', muted: '#71717a', border: '#d4d4d8',
              accent: '#a1a1aa', 'accent-soft': '#f4f4f5', dark: '#27272a', mid: '#a1a1aa',
            }
          }
        }
      }
    }
  </script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body { background: #e5e7eb; }
    .wf-phone { max-width: 390px; min-height: 100vh; margin: 0 auto; background: #ffffff; }
    .wf-card { background: #ffffff; border: 1px solid #e4e4e7; border-radius: 1rem; padding: 1rem; }
    .wf-btn-primary { display: inline-flex; align-items: center; justify-content: center; gap: 8px; background: #3f3f46; color: #ffffff; font-weight: 600; font-size: 16px; padding: 14px 24px; border-radius: 1rem; width: 100%; }
    .wf-btn-secondary { display: inline-flex; align-items: center; justify-content: center; gap: 8px; background: #f4f4f5; color: #3f3f46; font-weight: 600; font-size: 16px; padding: 14px 24px; border-radius: 1rem; width: 100%; border: 1px solid #e4e4e7; }
    .wf-input { width: 100%; padding: 14px 16px; border: 1px solid #d4d4d8; border-radius: 1rem; font-size: 16px; color: #18181b; background: #ffffff; outline: none; }
    .wf-section-title { font-size: 20px; font-weight: 600; color: #18181b; }
    .wf-bottom-bar { position: sticky; bottom: 0; background: #ffffff; border-top: 1px solid #e4e4e7; padding: 12px 16px; padding-bottom: max(12px, env(safe-area-inset-bottom)); }
  </style>
</head>
<body>
  <div class="wf-phone flex flex-col">
    <!-- Top Bar -->
    <div class="px-4 py-4 flex items-center gap-3 border-b border-zinc-100">
      <button class="p-1">
        <i data-lucide="arrow-left" class="w-5 h-5 text-wf-secondary"></i>
      </button>
      <div class="flex-1">
        <p class="font-semibold text-wf-text">Adjust Split</p>
        <p class="text-sm text-wf-muted">Apt 201 · 2 roommates</p>
      </div>
    </div>

    <!-- Content -->
    <div class="px-4 pt-6 flex-1">
      <!-- Split Type -->
      <div class="mb-6">
        <label class="block text-sm font-medium text-wf-secondary mb-3">Split type</label>
        <div class="flex gap-2">
          <button class="flex-1 py-2.5 rounded-xl bg-zinc-50 text-wf-muted text-sm font-medium text-center border border-zinc-200">Even</button>
          <button class="flex-1 py-2.5 rounded-xl bg-zinc-900 text-white text-sm font-semibold text-center">Custom</button>
        </div>
      </div>

      <!-- Per-person -->
      <h2 class="wf-section-title mb-4">Share per roommate</h2>

      <div class="space-y-4 mb-6">
        <!-- Maria -->
        <div class="wf-card">
          <div class="flex items-center gap-3 mb-3">
            <div class="w-10 h-10 bg-zinc-200 rounded-full flex items-center justify-center">
              <span class="text-sm font-bold text-wf-secondary">M</span>
            </div>
            <div class="flex-1">
              <div class="flex items-center gap-2">
                <p class="text-[15px] font-semibold text-wf-text">Maria</p>
                <span class="text-xs bg-zinc-100 text-wf-muted px-1.5 py-0.5 rounded">You</span>
              </div>
            </div>
          </div>
          <div class="flex items-center gap-3">
            <div class="relative flex-1">
              <input type="text" class="wf-input text-center font-bold text-lg" value="60">
              <span class="absolute right-4 top-1/2 -translate-y-1/2 text-wf-muted font-medium">%</span>
            </div>
            <div class="text-right">
              <p class="text-lg font-bold text-wf-text">R$ 1.560,00</p>
            </div>
          </div>
        </div>

        <!-- Ana -->
        <div class="wf-card">
          <div class="flex items-center gap-3 mb-3">
            <div class="w-10 h-10 bg-zinc-200 rounded-full flex items-center justify-center">
              <span class="text-sm font-bold text-wf-secondary">A</span>
            </div>
            <div class="flex-1">
              <p class="text-[15px] font-semibold text-wf-text">Ana</p>
            </div>
          </div>
          <div class="flex items-center gap-3">
            <div class="relative flex-1">
              <input type="text" class="wf-input text-center font-bold text-lg" value="40">
              <span class="absolute right-4 top-1/2 -translate-y-1/2 text-wf-muted font-medium">%</span>
            </div>
            <div class="text-right">
              <p class="text-lg font-bold text-wf-text">R$ 1.040,00</p>
            </div>
          </div>
        </div>
      </div>

      <!-- Validation -->
      <div class="flex items-center gap-2 p-3 bg-zinc-50 rounded-xl mb-6">
        <i data-lucide="check-circle" class="w-4 h-4 text-wf-mid flex-shrink-0"></i>
        <p class="text-sm text-wf-muted">Total adds up to 100% · R$ 2.600,00</p>
      </div>

      <!-- Info Note -->
      <div class="flex items-start gap-3 p-3 bg-zinc-50 rounded-xl">
        <i data-lucide="info" class="w-4 h-4 text-wf-mid mt-0.5 flex-shrink-0"></i>
        <p class="text-sm text-wf-muted">This split is between roommates. Your landlord sees the total owed — individual splits don't affect their billing.</p>
      </div>

      <div class="h-6"></div>
    </div>

    <!-- Bottom Actions -->
    <div class="wf-bottom-bar">
      <div class="space-y-2">
        <button class="wf-btn-primary">
          <i data-lucide="check" class="w-4 h-4"></i>
          Save Split
        </button>
        <button class="wf-btn-secondary !border-0 !bg-transparent text-wf-muted">
          Cancel
        </button>
      </div>
    </div>
  </div>

  <script>lucide.createIcons();</script>
</body>
</html>
