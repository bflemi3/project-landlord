<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Statement Notification (Tenant) — Wireframe</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            wf: {
              bg: '#e5e7eb', surface: '#ffffff', card: '#ffffff', text: '#18181b',
              secondary: '#52525b', muted: '#71717a', border: '#d4d4d8',
              accent: '#a1a1aa', 'accent-soft': '#f4f4f5', dark: '#27272a', mid: '#a1a1aa',
            }
          }
        }
      }
    }
  </script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body { background: #e5e7eb; }
    .wf-phone { max-width: 390px; min-height: 100vh; margin: 0 auto; background: #ffffff; }
    .wf-card { background: #ffffff; border: 1px solid #e4e4e7; border-radius: 1rem; padding: 1rem; }
    .wf-badge { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: 9999px; font-size: 13px; font-weight: 500; }
    .wf-badge-published { background: #e4e4e7; color: #3f3f46; }
    .wf-btn-primary { display: inline-flex; align-items: center; justify-content: center; gap: 8px; background: #3f3f46; color: #ffffff; font-weight: 600; font-size: 16px; padding: 14px 24px; border-radius: 1rem; width: 100%; }
    .wf-amount { font-size: 36px; font-weight: 700; color: #18181b; letter-spacing: -0.5px; }
    .wf-page-title { font-size: 28px; font-weight: 700; color: #18181b; }
    .wf-bottom-bar { position: sticky; bottom: 0; background: #ffffff; border-top: 1px solid #e4e4e7; padding: 12px 16px; padding-bottom: max(12px, env(safe-area-inset-bottom)); }
  </style>
</head>
<body>
  <div class="wf-phone flex flex-col">
    <!-- Simulated Email / In-App Notification -->
    <div class="bg-zinc-100 px-4 py-3 flex items-center gap-3 border-b border-zinc-200">
      <div class="w-8 h-8 bg-zinc-300 rounded-lg flex items-center justify-center flex-shrink-0">
        <i data-lucide="bell" class="w-4 h-4 text-zinc-600"></i>
      </div>
      <div class="flex-1 min-w-0">
        <p class="text-xs font-medium text-wf-secondary">mavenn</p>
        <p class="text-xs text-wf-muted truncate">Your March 2026 statement is ready</p>
      </div>
      <p class="text-xs text-wf-muted">now</p>
    </div>

    <!-- Content -->
    <div class="px-6 pt-8 flex-1 flex flex-col">
      <!-- Header -->
      <div class="text-center mb-8">
        <div class="w-14 h-14 bg-zinc-100 rounded-full flex items-center justify-center mx-auto mb-4">
          <i data-lucide="file-text" class="w-7 h-7 text-zinc-500"></i>
        </div>
        <h1 class="wf-page-title mb-2">Statement ready</h1>
        <p class="text-wf-muted text-[15px]">Your landlord published the March 2026 statement.</p>
      </div>

      <!-- Amount Card -->
      <div class="wf-card text-center mb-6">
        <p class="text-sm text-wf-muted mb-1">Amount due</p>
        <div class="wf-amount mb-1">R$ 2.600<span class="text-xl">,00</span></div>
        <p class="text-sm text-wf-secondary font-medium">Due March 10, 2026</p>
        <div class="mt-3">
          <span class="wf-badge wf-badge-published">
            <i data-lucide="check" class="w-3 h-3"></i> Published
          </span>
        </div>
      </div>

      <!-- Quick Breakdown -->
      <div class="wf-card mb-6">
        <p class="text-sm font-medium text-wf-secondary mb-3">Charges</p>
        <div class="space-y-2">
          <div class="flex items-center justify-between text-sm">
            <span class="text-wf-text">Rent</span>
            <span class="font-semibold text-wf-text">R$ 1.800,00</span>
          </div>
          <div class="flex items-center justify-between text-sm">
            <span class="text-wf-text">Electric</span>
            <span class="font-semibold text-wf-text">R$ 295,00</span>
          </div>
          <div class="flex items-center justify-between text-sm">
            <span class="text-wf-text">Water</span>
            <span class="font-semibold text-wf-text">R$ 165,00</span>
          </div>
          <div class="flex items-center justify-between text-sm">
            <span class="text-wf-text">Condo fee</span>
            <span class="font-semibold text-wf-text">R$ 245,00</span>
          </div>
          <div class="flex items-center justify-between text-sm">
            <span class="text-wf-text">Gas</span>
            <span class="font-semibold text-wf-text">R$ 95,00</span>
          </div>
        </div>
      </div>

      <!-- Property Context -->
      <div class="flex items-center gap-3 text-sm text-wf-muted mb-4">
        <i data-lucide="building-2" class="w-4 h-4"></i>
        <span>Apt 201 · Rua Augusta 123</span>
      </div>

      <div class="flex-1"></div>
    </div>

    <!-- Bottom Action -->
    <div class="wf-bottom-bar">
      <button class="wf-btn-primary">
        View Full Statement
        <i data-lucide="arrow-right" class="w-4 h-4"></i>
      </button>
    </div>
  </div>

  <script>lucide.createIcons();</script>
</body>
</html>
