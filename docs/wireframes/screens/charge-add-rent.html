<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Rent Charge — Wireframe</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            wf: {
              bg: '#e5e7eb', surface: '#ffffff', card: '#ffffff', text: '#18181b',
              secondary: '#52525b', muted: '#71717a', border: '#d4d4d8',
              accent: '#a1a1aa', 'accent-soft': '#f4f4f5', dark: '#27272a', mid: '#a1a1aa',
            }
          }
        }
      }
    }
  </script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body { background: #e5e7eb; }
    .wf-phone { max-width: 390px; min-height: 100vh; margin: 0 auto; background: #ffffff; }
    .wf-card { background: #ffffff; border: 1px solid #e4e4e7; border-radius: 1rem; padding: 1rem; }
    .wf-btn-primary { display: inline-flex; align-items: center; justify-content: center; gap: 8px; background: #3f3f46; color: #ffffff; font-weight: 600; font-size: 16px; padding: 14px 24px; border-radius: 1rem; width: 100%; }
    .wf-input { width: 100%; padding: 14px 16px; border: 1px solid #d4d4d8; border-radius: 1rem; font-size: 16px; color: #18181b; background: #ffffff; outline: none; }
    .wf-input:focus { border-color: #a1a1aa; box-shadow: 0 0 0 3px rgba(161,161,170,0.15); }
    .wf-input::placeholder { color: #a1a1aa; }
    .wf-page-title { font-size: 28px; font-weight: 700; color: #18181b; }
    .wf-bottom-bar { position: sticky; bottom: 0; background: #ffffff; border-top: 1px solid #e4e4e7; padding: 12px 16px; padding-bottom: max(12px, env(safe-area-inset-bottom)); }
  </style>
</head>
<body>
  <div class="wf-phone flex flex-col">
    <!-- Top Bar -->
    <div class="flex items-center gap-3 px-4 py-4 border-b border-zinc-100">
      <button class="p-1">
        <i data-lucide="arrow-left" class="w-5 h-5 text-wf-secondary"></i>
      </button>
      <div>
        <p class="text-sm text-wf-muted">Step 2 of 3</p>
        <p class="font-semibold text-wf-text">Define charges</p>
      </div>
    </div>

    <!-- Progress Bar -->
    <div class="px-4 pt-3">
      <div class="w-full h-1.5 bg-zinc-100 rounded-full">
        <div class="w-2/3 h-full bg-zinc-400 rounded-full"></div>
      </div>
    </div>

    <!-- Content -->
    <div class="px-6 pt-8 flex-1">
      <h1 class="wf-page-title mb-2">Set up rent</h1>
      <p class="text-wf-muted text-[15px] mb-8">This is the fixed monthly rent for Apt 201.</p>

      <div class="space-y-5">
        <!-- Amount -->
        <div>
          <label class="block text-sm font-medium text-wf-secondary mb-2">Monthly rent amount</label>
          <div class="relative">
            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-wf-muted font-medium">R$</span>
            <input type="text" class="wf-input pl-12 text-2xl font-bold" placeholder="0,00" value="1.800,00">
          </div>
        </div>

        <!-- Charge Type -->
        <div>
          <label class="block text-sm font-medium text-wf-secondary mb-2">Type</label>
          <div class="flex gap-2">
            <button class="flex-1 py-3 px-4 rounded-xl bg-zinc-900 text-white text-sm font-semibold text-center">Fixed recurring</button>
            <button class="flex-1 py-3 px-4 rounded-xl bg-zinc-100 text-wf-secondary text-sm font-medium text-center border border-zinc-200">Variable</button>
          </div>
          <p class="text-sm text-wf-muted mt-2">Same amount every month, added to statements automatically.</p>
        </div>

        <!-- Due Day -->
        <div>
          <label class="block text-sm font-medium text-wf-secondary mb-2">Due day of month</label>
          <input type="text" class="wf-input" placeholder="e.g. 10" value="10">
          <p class="text-sm text-wf-muted mt-2">Rent will be due on the 10th each month.</p>
        </div>

        <!-- Responsibility -->
        <div>
          <label class="block text-sm font-medium text-wf-secondary mb-2">Who pays?</label>
          <div class="space-y-2">
            <button class="w-full flex items-center gap-3 p-4 rounded-xl bg-zinc-900 text-white">
              <div class="w-5 h-5 rounded-full border-2 border-white flex items-center justify-center">
                <div class="w-2.5 h-2.5 bg-white rounded-full"></div>
              </div>
              <span class="font-medium">Tenant</span>
            </button>
            <button class="w-full flex items-center gap-3 p-4 rounded-xl bg-zinc-50 text-wf-secondary border border-zinc-200">
              <div class="w-5 h-5 rounded-full border-2 border-zinc-300"></div>
              <span class="font-medium">Landlord</span>
            </button>
            <button class="w-full flex items-center gap-3 p-4 rounded-xl bg-zinc-50 text-wf-secondary border border-zinc-200">
              <div class="w-5 h-5 rounded-full border-2 border-zinc-300"></div>
              <span class="font-medium">Shared split</span>
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Bottom Action -->
    <div class="wf-bottom-bar">
      <button class="wf-btn-primary">
        Save Rent Charge
        <i data-lucide="check" class="w-4 h-4"></i>
      </button>
    </div>
  </div>

  <script>lucide.createIcons();</script>
</body>
</html>
