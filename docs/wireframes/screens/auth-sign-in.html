<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Wireframe</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            wf: {
              bg: '#e5e7eb',
              surface: '#ffffff',
              card: '#ffffff',
              text: '#18181b',
              secondary: '#52525b',
              muted: '#71717a',
              border: '#d4d4d8',
              accent: '#a1a1aa',
              'accent-soft': '#f4f4f5',
              dark: '#27272a',
              mid: '#a1a1aa',
            }
          }
        }
      }
    }
  </script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body { background: #e5e7eb; }
    .wf-phone { max-width: 390px; min-height: 100vh; margin: 0 auto; background: #ffffff; }
    .wf-btn-primary { display: inline-flex; align-items: center; justify-content: center; gap: 8px; background: #3f3f46; color: #ffffff; font-weight: 600; font-size: 16px; padding: 14px 24px; border-radius: 1rem; width: 100%; }
    .wf-btn-secondary { display: inline-flex; align-items: center; justify-content: center; gap: 8px; background: #f4f4f5; color: #3f3f46; font-weight: 600; font-size: 16px; padding: 14px 24px; border-radius: 1rem; width: 100%; border: 1px solid #e4e4e7; }
    .wf-input { width: 100%; padding: 14px 16px; border: 1px solid #d4d4d8; border-radius: 1rem; font-size: 16px; color: #18181b; background: #ffffff; outline: none; }
    .wf-input:focus { border-color: #a1a1aa; box-shadow: 0 0 0 3px rgba(161,161,170,0.15); }
    .wf-input::placeholder { color: #a1a1aa; }
  </style>
</head>
<body>
  <div class="wf-phone flex flex-col">
    <!-- Header -->
    <div class="px-6 pt-16 pb-8 text-center">
      <div class="text-3xl font-bold text-wf-text tracking-tight mb-2">mavenn</div>
      <p class="text-wf-muted text-[15px]">Shared billing you can trust</p>
    </div>

    <!-- Sign In Form -->
    <div class="px-6 flex-1">
      <h1 class="text-[28px] font-bold text-wf-text mb-8">Sign in</h1>

      <!-- Google — primary -->
      <button class="wf-btn-primary mb-4">
        <i data-lucide="chrome" class="w-5 h-5"></i>
        Continue with Google
      </button>

      <!-- Divider -->
      <div class="flex items-center gap-4 my-6">
        <div class="flex-1 h-px bg-zinc-200"></div>
        <span class="text-sm text-wf-muted">or sign in with email</span>
        <div class="flex-1 h-px bg-zinc-200"></div>
      </div>

      <!-- Email form — secondary -->
      <div class="space-y-4 mb-6">
        <div>
          <label class="block text-sm font-medium text-wf-secondary mb-2">Email</label>
          <input type="email" class="wf-input" placeholder="you@example.com">
        </div>
        <div>
          <label class="block text-sm font-medium text-wf-secondary mb-2">Password</label>
          <input type="password" class="wf-input" placeholder="••••••••">
        </div>
      </div>

      <button class="wf-btn-secondary mb-4">Sign In with Email</button>

      <div class="text-center mb-4">
        <a href="#" class="text-sm text-wf-muted hover:text-wf-secondary">Forgot password?</a>
      </div>

      <!-- Sign Up Link -->
      <div class="text-center mt-8">
        <p class="text-[15px] text-wf-muted">
          Don't have an account?
          <a href="#" class="text-wf-text font-semibold">Sign up</a>
        </p>
      </div>
    </div>

    <!-- Language Selector -->
    <div class="px-6 py-6 text-center">
      <div class="inline-flex items-center gap-3 text-sm text-wf-muted">
        <span class="font-medium text-wf-text">EN</span>
        <span>·</span>
        <span>PT-BR</span>
        <span>·</span>
        <span>ES</span>
      </div>
    </div>
  </div>

  <script>lucide.createIcons();</script>
</body>
</html>
